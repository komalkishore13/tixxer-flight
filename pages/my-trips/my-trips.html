<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips — Tixxer Flight</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="./my-trips.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index/index.html" class="navbar-logo">
        <div class="logo-icon">✈</div>
        Tixxer <span class="highlight">Flight</span>
      </a>
      <div class="navbar-links">
        <a href="../index/index.html">Flights</a>
        <a href="../my-trips/my-trips.html" class="active">My Trips</a>
      </div>
      <div class="navbar-actions">
        <div class="powered-badge">Powered by Sepolia Ethereum</div>
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
      </div>
    </div>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="trips-page">
    <div class="trips-header">
      <h1 class="trips-title">My Trips</h1>
      <p class="trips-sub">All your booked flights in one place</p>
    </div>

    <!-- Empty State -->
    <div class="trips-empty" id="tripsEmpty" style="display: none;">
      <div class="empty-icon">✈</div>
      <h2 class="empty-title">No trips yet</h2>
      <p class="empty-sub">Your booked flights will appear here after payment is confirmed.</p>
      <a href="../index/index.html" class="btn-book-now">Search Flights</a>
    </div>

    <!-- Trip Cards -->
    <div class="trips-list" id="tripsList"></div>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Tixxer <span class="highlight">Flight</span></div>
      <div class="footer-text">Book flights. Pay with crypto. Built on Sepolia testnet.</div>
    </div>
  </footer>

  <script src="../../data/flights.js"></script>
  <script src="../../components/helpers.js"></script>
  <script src="./my-trips.js"></script>
</body>
</html>
